<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a7c59">
  <title>Tu rutina de hoy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- Cabecera de bloque --- */
    .bloque-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 20px 0 6px;
      width: 100%;
    }
    .bloque-header-linea {
      flex: 1;
      height: 1px;
      background: #ddd;
    }
    .bloque-header-texto {
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      padding: 0 4px;
    }

    /* Colores por tipo de bloque */
    .tipo-calentamiento { color: #e07a3a; }
    .tipo-central       { color: var(--verde); }
    .tipo-cierre        { color: #9c6dc5; }
    .tipo-estiramiento  { color: #5b8dd9; }
    .tipo-otro          { color: var(--text-suave); }

    /* --- Fila de ejercicio --- */
    .ej-fila {
      display: flex;
      align-items: center;
      gap: 14px;
      background: white;
      border-radius: var(--radio);
      padding: 14px 12px;
      box-shadow: var(--sombra);
      margin: 6px 0;
      width: 100%;
    }

    /* Miniatura */
    .ej-thumb {
      min-width: 58px; width: 58px; height: 58px;
      border-radius: 12px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.1rem; background: var(--verde-bg); flex-shrink: 0;
    }
    .ej-thumb .media-img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 12px;
    }
    .ej-thumb iframe {
      width: 116px; height: 116px;
      transform: scale(0.5); transform-origin: top left;
      pointer-events: none;
    }

    /* Info */
    .ej-info { flex: 1; min-width: 0; }
    .ej-nombre {
      font-size: 1.05rem; font-weight: bold;
      color: var(--text); margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ej-duracion { font-size: 0.88rem; color: var(--text-suave); }

    /* Botón cambiar */
    .btn-swap {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: white;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, transform 0.2s;
      user-select: none;
      color: var(--text-suave);
    }
    .btn-swap:active {
      transform: rotate(180deg);
      border-color: var(--verde);
      color: var(--verde);
    }
    .btn-swap:disabled {
      opacity: 0.3;
      cursor: default;
    }
  </style>
</head>
<body>

  <h1>Tu rutina de hoy 💪</h1>
  <p style="margin: 10px 0 4px; color: var(--verde); font-size: 1rem;">
    Sin prisas · Tú puedes · Toca ↻ para cambiar un ejercicio
  </p>

  <div id="lista" style="width:100%;"></div>

  <button class="btn" onclick="window.location.href='workout.html'">¡Empezar! 🌟</button>
  <button class="btn btn-secundario" onclick="window.location.href='index.html'">
    ← Volver al inicio
  </button>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // Emoji e icono por tipo de bloque
    const BLOQUE_META = {
      calentamiento: { emoji: '🔥', clase: 'tipo-calentamiento', label: 'Calentamiento' },
      central:       { emoji: '💪', clase: 'tipo-central',       label: 'Ejercicios'    },
      cierre:        { emoji: '🌿', clase: 'tipo-cierre',        label: 'Cierre'        },
      estiramiento:  { emoji: '🧘', clase: 'tipo-estiramiento',  label: 'Estiramientos' },
    };

    function metaBloque(tipo) {
      const k = (tipo || '').toLowerCase();
      return BLOQUE_META[k] || { emoji: '•', clase: 'tipo-otro', label: tipo || '' };
    }

    function durStr(seg) {
      seg = parseInt(seg) || 0;
      const m = Math.floor(seg / 60), s = seg % 60;
      if (m > 0 && s > 0) return `${m} min ${s} seg`;
      if (m > 0)           return `${m} min`;
      return `${s} seg`;
    }

    function renderLista(ejercicios) {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';
      let tipoActual  = null;

      ejercicios.forEach((ej, i) => {
        const tipo = ej._tipo || '';
        const meta = metaBloque(tipo);

        // Cabecera de bloque cuando cambia el tipo
        if (tipo !== tipoActual) {
          tipoActual = tipo;
          const header = document.createElement('div');
          header.className = 'bloque-header';
          header.innerHTML = `
            <div class="bloque-header-linea"></div>
            <span class="bloque-header-texto ${meta.clase}">${meta.emoji} ${meta.label}</span>
            <div class="bloque-header-linea"></div>
          `;
          lista.appendChild(header);
        }

        // Fila del ejercicio
        const fila = document.createElement('div');
        fila.className = 'ej-fila';
        fila.id        = `fila-${i}`;

        // Miniatura
        const thumb = document.createElement('div');
        thumb.className = 'ej-thumb';
        insertarMedia(thumb, ej.animacion, ej.emoji || '🏃', 'media-img');

        // Info
        const info = document.createElement('div');
        info.className = 'ej-info';
        info.innerHTML = `
          <div class="ej-nombre">${ej.nombre || ''}</div>
          <div class="ej-duracion">${durStr(ej.segundos)}</div>
        `;

        // Botón cambiar
        const pool        = cargarPool();
        const tipoKey     = (tipo || '').toLowerCase();
        const disponibles = pool[tipoKey] || [];
        const puedeSwap   = disponibles.length > 1;

        const btnSwap = document.createElement('button');
        btnSwap.className = 'btn-swap';
        btnSwap.title     = puedeSwap ? 'Cambiar este ejercicio' : 'No hay más ejercicios de este tipo';
        btnSwap.disabled  = !puedeSwap;
        btnSwap.textContent = '↻';
        btnSwap.onclick = () => {
          const actualizados = swapEjercicio(i);
          renderLista(actualizados);   // volver a pintar toda la lista
        };

        fila.appendChild(thumb);
        fila.appendChild(info);
        fila.appendChild(btnSwap);
        lista.appendChild(fila);
      });
    }

    // --- Arrancar ---
    let ejercicios = cargarEjercicios();
    if (ejercicios.length === 0) window.location.href = 'index.html';
    renderLista(ejercicios);
  </script>
</body>
</html>
