<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a7c59">
  <title>App Mamá</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      height: 100dvh;
      overflow: hidden;
      justify-content: center;
      padding: 20px 20px 28px;
    }
    #consejo-card { text-align: left; }
    #consejo-titulo { text-align: left; margin-bottom: 8px; }
    #consejo-desc   { text-align: left; }
    #racha {
      font-size: 1rem;
      color: var(--verde);
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1 id="saludo">Buenos días 🌸</h1>

  <div class="tarjeta" id="consejo-card" style="margin-top: 16px;">
    <span class="etiqueta-verde">💚 Consejo del día</span>
    <h2 id="consejo-titulo">Cargando...</h2>
    <p id="consejo-desc" style="text-align:left; margin-top:8px;"></p>
  </div>

  <div id="racha"></div>

  <button class="btn" id="btn-ejercicios" onclick="irAPreview()">
    Ver mis ejercicios de hoy →
  </button>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    async function init() {
      const hora = new Date().getHours();
      let saludo;
      if      (hora < 12) saludo = `¡Buenos días, ${CONFIG.NOMBRE}! 🌸`;
      else if (hora < 20) saludo = `¡Buenas tardes, ${CONFIG.NOMBRE}! ☀️`;
      else                saludo = `¡Buenas noches, ${CONFIG.NOMBRE}! 🌙`;
      document.getElementById('saludo').textContent = saludo;

      try {
        const c = await getConsejoDelDia();
        document.getElementById('consejo-titulo').textContent = c.titulo      || '';
        document.getElementById('consejo-desc').textContent   = c.descripcion || '';
      } catch {
        document.getElementById('consejo-titulo').textContent = 'El jengibre';
        document.getElementById('consejo-desc').textContent   =
          'El jengibre activa la circulación y alivia las articulaciones. ' +
          'Una rodaja en agua caliente con limón, una delicia.';
      }

      const racha = getRacha();
      if (sesionCompletadaHoy()) {
        document.getElementById('btn-ejercicios').textContent = 'Repetir ejercicios 💪';
        if (racha >= 2) {
          document.getElementById('racha').textContent = `🔥 ¡Llevas ${racha} días seguidos!`;
        } else {
          document.getElementById('racha').textContent = `✅ ¡Hoy ya lo has hecho!`;
        }
      } else if (racha >= 2) {
        document.getElementById('racha').textContent = `🔥 ¡Llevas ${racha} días seguidos! ¡A por el ${racha + 1}!`;
      }
    }

    async function irAPreview() {
      const btn = document.getElementById('btn-ejercicios');
      btn.textContent = 'Cargando...';
      btn.disabled    = true;
      try {
        const ejercicios = await getEjerciciosPorBloques();
        guardarEjercicios(ejercicios);
        window.location.href = 'preview.html';
      } catch {
        btn.textContent = '⚠️ Error al cargar. ¿Tienes internet?';
        btn.disabled    = false;
      }
    }

    init();
  </script>
</body>
</html>
