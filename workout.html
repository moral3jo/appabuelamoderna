<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a7c59">
  <title>¡A moverse!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    body { justify-content: flex-start; }

    /* --- Overlay de inicio --- */
    #overlay {
      position: fixed; inset: 0;
      background: var(--crema);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 32px;
      text-align: center;
    }
    #overlay h1 { font-size: 2.2rem; margin-bottom: 20px; }
    #overlay p  { font-size: 1.15rem; margin-bottom: 32px; }
    #overlay .btn { max-width: 340px; }

    /* --- Timer --- */
    .timer-wrap { width: 100%; text-align: center; margin: 14px 0 4px; }
    .timer {
      font-size: 5.5rem;
      font-weight: bold;
      color: var(--verde);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* --- Barra progreso --- */
    .barra-wrap { width: 100%; margin: 8px 0 2px; }
    .barra-fondo {
      width: 100%; height: 18px;
      background: #ddd; border-radius: 9px; overflow: hidden;
    }
    .barra-fill {
      height: 100%;
      background: var(--verde);
      border-radius: 9px;
      transition: width 1s linear;
    }
    .barra-label {
      font-size: 0.85rem; color: var(--text-suave);
      text-align: right; margin-top: 4px;
    }

    /* --- Zona de media (imagen/gif/video/youtube/emoji) --- */
    #media-wrap {
      width: 100%;
      min-height: 200px;
      max-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 4px;
      border-radius: var(--radio);
      overflow: hidden;
      background: var(--verde-bg);
      font-size: 7rem;      /* fallback emoji */
      line-height: 1;
    }
    #media-wrap .media-img {
      width: 100%;
      height: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: var(--radio);
    }
    #media-wrap video.media-img {
      object-fit: cover;
    }
    #media-wrap iframe.media-img {
      width: 100%;
      height: 220px;
      border: none;
    }

    /* --- Nombre y descripción del ejercicio --- */
    .ej-nombre-grande {
      font-size: 1.85rem;
      font-weight: bold;
      color: var(--text);
      text-align: center;
      margin: 8px 0 6px;
      line-height: 1.25;
    }
    .ej-desc-grande {
      font-size: 1rem;
      color: var(--text-suave);
      text-align: center;
      line-height: 1.6;
    }

    /* --- Controles --- */
    .controles {
      display: flex; gap: 14px;
      width: 100%; margin-top: 20px;
    }
    .btn-ctrl {
      flex: 1; min-height: 68px; font-size: 1.6rem;
      border: none; border-radius: var(--radio);
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }
    .btn-ctrl:active { transform: scale(0.96); }
    .btn-pausa { background: var(--amarillo); color: var(--text); }
    .btn-salir  { background: #ffcdd2; color: #c62828; }

    /* --- Banner cambio --- */
    #banner-cambio {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--verde); color: white;
      text-align: center; font-size: 1.3rem; padding: 18px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      z-index: 50;
    }
    #banner-cambio.visible { transform: translateY(0); }
  </style>
</head>
<body>

  <div id="banner-cambio">🌟 ¡Siguiente ejercicio!</div>

  <!-- Overlay — el gesto de usuario aquí activa el AudioContext -->
  <div id="overlay">
    <div style="font-size:5rem;">💪</div>
    <h1>¡Vamos a ello!</h1>
    <p>Toca el botón cuando estés lista.<br>¡Sin prisas, a tu ritmo!</p>
    <button class="btn" onclick="arrancar()">¡Empezar ya! 🌟</button>
    <button class="btn btn-secundario"
            onclick="window.location.href='preview.html'"
            style="max-width:340px; margin-top:12px;">← Volver</button>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer" id="timer">7:00</div>
  </div>

  <!-- Barra progreso -->
  <div class="barra-wrap">
    <div class="barra-fondo">
      <div class="barra-fill" id="barra" style="width:0%"></div>
    </div>
    <div class="barra-label" id="barra-label">Ejercicio 1 de 4</div>
  </div>

  <!-- Media del ejercicio (img / gif / video / iframe / emoji) -->
  <div id="media-wrap"></div>

  <!-- Nombre y descripción -->
  <div class="ej-nombre-grande" id="ej-nombre">Preparando…</div>
  <div class="ej-desc-grande"   id="ej-desc"></div>

  <!-- Controles -->
  <div class="controles">
    <button class="btn-ctrl btn-pausa" id="btn-pausa" onclick="togglePausa()">⏸</button>
    <button class="btn-ctrl btn-salir"                onclick="salir()">✕</button>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const ejercicios = cargarEjercicios();
    if (ejercicios.length === 0) window.location.href = 'index.html';

    let idxActual         = 0;
    let segsRestantesEj   = parseInt(ejercicios[0]?.segundos) || 60;
    let segsTranscurridos = 0;
    const TOTAL_SEGS      = CONFIG.DURACION_TOTAL;
    let pausado           = false;
    let intervalo         = null;
    let audioCtx          = null;

    // ---- Audio ----

    function crearAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tono(freq, durSeg, retrasoCx = 0, vol = 0.25) {
      if (!audioCtx) return;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type            = 'sine';
      osc.frequency.value = freq;
      const t0 = audioCtx.currentTime + retrasoCx;
      gain.gain.setValueAtTime(vol, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + durSeg);
      osc.start(t0);
      osc.stop(t0 + durSeg + 0.05);
    }

    function sonidoCambio()  {
      tono(523, 0.12, 0.00);
      tono(659, 0.12, 0.18);
      tono(784, 0.25, 0.36);
    }
    function sonidoAviso()   {
      tono(880, 0.08, 0.00);
      tono(880, 0.08, 0.14);
      tono(880, 0.08, 0.28);
    }
    function sonidoFin()     {
      [0, 0.18, 0.36, 0.54, 0.72].forEach((t, i) => tono(400 + i * 100, 0.22, t, 0.30));
    }

    // ---- UI ----

    function actualizarEjercicio() {
      const ej = ejercicios[idxActual];
      document.getElementById('ej-nombre').textContent = ej.nombre  || ej.id || '';
      document.getElementById('ej-desc').textContent   = ej.descripcion || '';
      document.getElementById('barra-label').textContent =
        `Ejercicio ${idxActual + 1} de ${ejercicios.length}`;

      // Media: columna "animacion" (normalizada desde "Animación")
      insertarMedia(
        document.getElementById('media-wrap'),
        ej.animacion,
        ej.emoji || '🏃',
        'media-img'
      );
    }

    function actualizarTimer() {
      const m = Math.floor(segsRestantesEj / 60);
      const s = segsRestantesEj % 60;
      document.getElementById('timer').textContent =
        `${m}:${s.toString().padStart(2, '0')}`;

      const pct = Math.min(100, (segsTranscurridos / TOTAL_SEGS) * 100);
      document.getElementById('barra').style.width = pct + '%';
    }

    function mostrarBannerCambio() {
      const b = document.getElementById('banner-cambio');
      b.classList.add('visible');
      setTimeout(() => b.classList.remove('visible'), 1800);
    }

    // ---- Lógica del timer ----

    function tick() {
      if (pausado) return;
      if (segsRestantesEj === 3) sonidoAviso();

      segsRestantesEj--;
      segsTranscurridos++;
      actualizarTimer();

      if (segsRestantesEj <= 0) {
        idxActual++;
        if (idxActual >= ejercicios.length) {
          finSesion();
        } else {
          segsRestantesEj = parseInt(ejercicios[idxActual].segundos) || 60;
          sonidoCambio();
          mostrarBannerCambio();
          actualizarEjercicio();
        }
      }
    }

    function togglePausa() {
      pausado = !pausado;
      document.getElementById('btn-pausa').textContent = pausado ? '▶' : '⏸';
      if (audioCtx) pausado ? audioCtx.suspend() : audioCtx.resume();
    }

    function salir() {
      clearInterval(intervalo);
      window.location.href = 'feedback.html';
    }

    function finSesion() {
      clearInterval(intervalo);
      sonidoFin();
      marcarSesionCompleta();

      document.getElementById('timer').textContent     = '0:00';
      document.getElementById('barra').style.cssText  += '; width:100%; transition:none';
      document.getElementById('media-wrap').textContent = '🎉';
      document.getElementById('ej-nombre').textContent  = '¡Lo has conseguido!';
      document.getElementById('ej-desc').textContent    = '¡Eres increíble!';
      document.getElementById('btn-pausa').style.display = 'none';
      const btnSalir = document.querySelector('.btn-salir');
      btnSalir.textContent = 'Continuar →';
      btnSalir.onclick     = () => window.location.href = 'feedback.html';

      setTimeout(() => window.location.href = 'feedback.html', 3500);
    }

    // ---- Arrancar (gesto de usuario → AudioContext permitido) ----

    function arrancar() {
      crearAudioCtx();
      document.getElementById('overlay').style.display = 'none';
      actualizarEjercicio();
      actualizarTimer();
      intervalo = setInterval(tick, 1000);
    }

    // Precalcular timer antes de pulsar
    actualizarTimer();
  </script>
</body>
</html>
