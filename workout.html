<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a7c59">
  <title>¡A moverse!</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <style>
    body { justify-content: flex-start; }

    /* --- Overlay de inicio --- */
    #overlay {
      position: fixed; inset: 0;
      background: var(--crema);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; padding: 32px; text-align: center;
    }
    #overlay h1 { font-size: 2.2rem; margin-bottom: 20px; }
    #overlay p  { font-size: 1.15rem; margin-bottom: 32px; }
    #overlay .btn { max-width: 340px; }

    /* --- Timer --- */
    .timer-wrap { width: 100%; text-align: center; margin: 14px 0 4px; }
    .timer {
      font-size: 5.5rem; font-weight: bold;
      font-variant-numeric: tabular-nums; line-height: 1;
      transition: color 0.4s;
    }
    .timer.ejercicio { color: var(--verde); }
    .timer.descanso  { color: #5b8dd9; }

    /* --- Barra progreso --- */
    .barra-wrap { width: 100%; margin: 8px 0 2px; }
    .barra-fondo {
      width: 100%; height: 18px;
      background: #ddd; border-radius: 9px; overflow: hidden;
    }
    .barra-fill {
      height: 100%; border-radius: 9px;
      transition: width 1s linear, background 0.4s;
    }
    .barra-fill.ejercicio { background: var(--verde); }
    .barra-fill.descanso  { background: #5b8dd9; }
    .barra-label {
      font-size: 0.85rem; color: var(--text-suave);
      text-align: right; margin-top: 4px;
    }

    /* --- Zona de media --- */
    #media-wrap {
      width: 100%; min-height: 180px; max-height: 240px;
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0 4px; border-radius: var(--radio);
      overflow: hidden; background: var(--verde-bg);
      font-size: 6.5rem; line-height: 1;
      transition: background 0.4s;
    }
    #media-wrap.descanso { background: #e8eef8; }
    #media-wrap .media-img {
      width: 100%; height: 100%; max-height: 240px;
      object-fit: contain; border-radius: var(--radio);
    }
    #media-wrap video.media-img { object-fit: cover; }
    #media-wrap iframe.media-img { width: 100%; height: 200px; border: none; }

    /* --- Nombre y descripción --- */
    .ej-nombre-grande {
      font-size: 1.85rem; font-weight: bold;
      color: var(--text); text-align: center;
      margin: 8px 0 4px; line-height: 1.25;
    }
    .ej-desc-grande {
      font-size: 1rem; color: var(--text-suave);
      text-align: center; line-height: 1.6;
    }

    /* --- Card "a continuación" durante el descanso --- */
    #siguiente-card {
      display: none; width: 100%;
      background: white; border-radius: var(--radio);
      padding: 14px 16px; box-shadow: var(--sombra);
      margin-top: 10px; text-align: left;
    }
    #siguiente-card.visible { display: flex; align-items: center; gap: 14px; }
    .siguiente-label {
      font-size: 0.8rem; color: #5b8dd9; font-weight: bold;
      margin-bottom: 4px; display: block;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .siguiente-thumb {
      min-width: 52px; width: 52px; height: 52px;
      border-radius: 10px; background: #e8eef8;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; overflow: hidden; flex-shrink: 0;
    }
    .siguiente-thumb .media-img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
    }
    .siguiente-nombre { font-size: 1.05rem; font-weight: bold; color: var(--text); }

    /* --- Indicador de música --- */
    #music-indicator {
      font-size: 0.82rem; color: var(--text-suave);
      text-align: center; margin-top: 2px; min-height: 1.2em;
      transition: opacity 0.5s;
    }

    /* --- Controles --- */
    .controles { display: flex; gap: 14px; width: 100%; margin-top: 14px; }
    .btn-ctrl {
      flex: 1; min-height: 68px; font-size: 1.6rem;
      border: none; border-radius: var(--radio); cursor: pointer;
      transition: transform 0.1s; user-select: none;
    }
    .btn-ctrl:active { transform: scale(0.96); }
    .btn-pausa { background: var(--amarillo); color: var(--text); }
    .btn-salir  { background: #ffcdd2; color: #c62828; }
    #btn-saltar {
      display: none; background: #e8eef8; color: #5b8dd9;
      font-size: 1rem; font-weight: bold;
    }
    #btn-saltar.visible { display: block; }

    /* --- Banner cambio --- */
    #banner-cambio {
      position: fixed; top: 0; left: 0; right: 0;
      color: white; text-align: center; font-size: 1.3rem; padding: 18px;
      transform: translateY(-100%);
      transition: transform 0.3s ease, background 0.3s;
      z-index: 50;
    }
    #banner-cambio.visible { transform: translateY(0); }
    #banner-cambio.ejercicio { background: var(--verde); }
    #banner-cambio.descanso  { background: #5b8dd9; }
  </style>
</head>
<body>

  <div id="banner-cambio"></div>

  <!-- Overlay de inicio -->
  <div id="overlay">
    <div style="font-size:5rem;">💪</div>
    <h1>¡Vamos a ello!</h1>
    <p>Toca el botón cuando estés lista.<br>¡Sin prisas, a tu ritmo!</p>
    <button class="btn" onclick="arrancar()">¡Empezar ya! 🌟</button>
    <button class="btn btn-secundario"
            onclick="window.location.href='preview.html'"
            style="max-width:340px; margin-top:12px;">← Volver</button>
  </div>

  <!-- Timer -->
  <div class="timer-wrap">
    <div class="timer ejercicio" id="timer">–:––</div>
  </div>

  <!-- Barra progreso -->
  <div class="barra-wrap">
    <div class="barra-fondo">
      <div class="barra-fill ejercicio" id="barra" style="width:0%"></div>
    </div>
    <div class="barra-label" id="barra-label">Ejercicio 1 de 4</div>
  </div>

  <!-- Media del ejercicio -->
  <div id="media-wrap"></div>

  <!-- Nombre y descripción -->
  <div class="ej-nombre-grande" id="ej-nombre">Preparando…</div>
  <div class="ej-desc-grande"   id="ej-desc"></div>

  <!-- Indicador de música -->
  <div id="music-indicator"></div>

  <!-- Card "a continuación" (solo visible en descanso) -->
  <div id="siguiente-card">
    <div class="siguiente-thumb" id="siguiente-thumb"></div>
    <div>
      <span class="siguiente-label">A continuación…</span>
      <div class="siguiente-nombre" id="siguiente-nombre"></div>
    </div>
  </div>

  <!-- Controles -->
  <div class="controles">
    <button class="btn-ctrl btn-pausa" id="btn-pausa" onclick="togglePausa()">⏸</button>
    <button class="btn-ctrl" id="btn-saltar" onclick="saltarDescanso()">Saltar descanso →</button>
    <button class="btn-ctrl btn-salir" onclick="salir()">✕</button>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    const ejercicios = cargarEjercicios();
    if (ejercicios.length === 0) window.location.href = 'index.html';

    // DEV_MODE: tiempos muy cortos para probar el flujo
    const DEV        = CONFIG.DEV_MODE === true;
    if (DEV) ejercicios.forEach(e => { e.segundos = '10'; });

    const DESCANSO   = DEV ? 2 : (CONFIG.DESCANSO_SEGUNDOS || 20);
    const TOTAL_EJ   = ejercicios.reduce((s, e) => s + (parseInt(e.segundos) || 60), 0);
    const TOTAL_SEGS = TOTAL_EJ + DESCANSO * (ejercicios.length - 1);

    // Cuántos segundos antes del fin del ejercicio mostrar el "siguiente"
    const AVISO_SIGUIENTE = DEV ? 4 : 10;

    // Estado
    let modo          = 'ejercicio';
    let idxActual     = 0;
    let segsRestantes = parseInt(ejercicios[0]?.segundos) || 60;
    let segsTransc    = 0;
    let pausado       = false;
    let intervalo     = null;

    // ================================================================
    //  AUDIO — efectos (Web Audio API)
    // ================================================================
    let audioCtx = null;

    function crearAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tono(freq, dur, retraso = 0, vol = 0.25) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t0 = audioCtx.currentTime + retraso;
      g.gain.setValueAtTime(vol, t0);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
      osc.start(t0); osc.stop(t0 + dur + 0.05);
    }

    function sonidoInicioEjercicio() {
      tono(523, 0.12, 0.00); tono(659, 0.12, 0.18); tono(784, 0.25, 0.36);
    }
    function sonidoInicioDescanso() {
      tono(440, 0.20, 0.00); tono(370, 0.30, 0.25);
    }
    function sonidoAviso() {
      tono(880, 0.08, 0.00); tono(880, 0.08, 0.14); tono(880, 0.08, 0.28);
    }
    function sonidoFin() {
      [0, 0.18, 0.36, 0.54, 0.72].forEach((t, i) => tono(400 + i * 100, 0.22, t, 0.30));
    }

    // ================================================================
    //  MÚSICA DE FONDO
    //  sounds/relax.mp3   → calentamiento, cierre, estiramiento, descanso
    //  sounds/animado.mp3 → central
    //  Arranca en posición aleatoria para que nunca suene igual.
    //  Fade suave al cambiar de pista.
    // ================================================================

    // Qué archivo corresponde a cada tipo de bloque
    function archivoMusica(tipoBloque) {
      return (tipoBloque || '').toLowerCase() === 'central'
        ? 'sounds/animado.mp3'
        : 'sounds/relax.mp3';
    }

    let musicaActual     = null;   // objeto Audio en reproducción
    let archivoActual    = null;   // ruta del archivo que suena ahora
    let fadeIntervalo    = null;   // intervalo del fade en curso

    function cancelarFade() {
      if (fadeIntervalo) { clearInterval(fadeIntervalo); fadeIntervalo = null; }
    }

    function fadeVolumen(audio, destino, durMs, alTerminar) {
      cancelarFade();
      const paso      = 50;
      const pasos     = durMs / paso;
      const delta     = (destino - audio.volume) / pasos;
      fadeIntervalo = setInterval(() => {
        audio.volume = Math.min(1, Math.max(0, audio.volume + delta));
        if ((delta > 0 && audio.volume >= destino) ||
            (delta < 0 && audio.volume <= destino)) {
          audio.volume = destino;
          cancelarFade();
          if (alTerminar) alTerminar();
        }
      }, paso);
    }

    function iniciarMusica(tipoBloque) {
      const archivo = archivoMusica(tipoBloque);
      if (archivo === archivoActual && musicaActual && !musicaActual.paused) return;

      // Fade out y reemplazar
      const viejo = musicaActual;
      if (viejo) {
        fadeVolumen(viejo, 0, 1500, () => { viejo.pause(); viejo.src = ''; });
      }

      const nuevo    = new Audio(archivo);
      nuevo.loop     = true;
      nuevo.volume   = 0;
      musicaActual   = nuevo;
      archivoActual  = archivo;

      // Inicio aleatorio: esperamos la duración y arrancamos en punto random
      nuevo.addEventListener('loadedmetadata', () => {
        // Deja al menos 2 min al final para que loop no sea inmediato
        const margen = Math.min(120, nuevo.duration * 0.1);
        const max    = Math.max(0, nuevo.duration - margen);
        nuevo.currentTime = Math.random() * max;
        nuevo.play().catch(() => {});
        fadeVolumen(nuevo, 0.55, 2000);
        mostrarIndicadorMusica(tipoBloque);
      }, { once: true });

      nuevo.addEventListener('error', () => {
        // El archivo no existe: silencio total, sin error visible
        archivoActual = null;
        musicaActual  = null;
      }, { once: true });

      // Intentar cargar (el play real lo da loadedmetadata)
      nuevo.load();
    }

    function pausarMusica() {
      if (musicaActual && !musicaActual.paused) musicaActual.pause();
    }

    function reanudarMusica() {
      if (musicaActual && musicaActual.paused && archivoActual) {
        musicaActual.play().catch(() => {});
      }
    }

    function detenerMusica() {
      cancelarFade();
      if (musicaActual) {
        fadeVolumen(musicaActual, 0, 1200, () => {
          musicaActual.pause();
          musicaActual = null;
          archivoActual = null;
        });
      }
    }

    function mostrarIndicadorMusica(tipoBloque) {
      const el   = document.getElementById('music-indicator');
      const tipo = (tipoBloque || '').toLowerCase();
      el.textContent = tipo === 'central' ? '🎵 Música animada' : '🎵 Música relajante';
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 3000);
    }

    // ================================================================
    //  UI
    // ================================================================

    function pintarModo(mostrarSiguiente = false) {
      const esDescanso  = (modo === 'descanso');
      const verSiguiente = esDescanso || mostrarSiguiente;
      document.getElementById('timer').className    = `timer ${modo}`;
      document.getElementById('barra').className    = `barra-fill ${modo}`;
      document.getElementById('media-wrap').className     = esDescanso ? 'descanso' : '';
      document.getElementById('siguiente-card').className = verSiguiente ? 'visible' : '';
      document.getElementById('btn-saltar').className     = esDescanso ? 'btn-ctrl visible' : 'btn-ctrl';
    }

    function actualizarSiguienteCard() {
      // Rellena la card del siguiente ejercicio (usada tanto en descanso como en aviso final)
      const siguiente = ejercicios[idxActual + 1];
      if (!siguiente) return;
      document.getElementById('siguiente-nombre').textContent = siguiente.nombre || '';
      insertarMedia(
        document.getElementById('siguiente-thumb'),
        siguiente.animacion, siguiente.emoji || '🏃', 'media-img'
      );
    }

    function actualizarEjercicio() {
      const ej = ejercicios[idxActual];
      document.getElementById('ej-nombre').textContent    = ej.nombre      || '';
      document.getElementById('ej-desc').textContent      = ej.descripcion || '';
      document.getElementById('barra-label').textContent  =
        `Ejercicio ${idxActual + 1} de ${ejercicios.length}`;
      insertarMedia(document.getElementById('media-wrap'), ej.animacion, ej.emoji || '🏃', 'media-img');
    }

    function actualizarDescanso() {
      document.getElementById('ej-nombre').textContent = '¡Descansa!';
      document.getElementById('ej-desc').textContent   = 'Respira, bebe agua si necesitas.';
      document.getElementById('media-wrap').textContent = '💧';
      actualizarSiguienteCard();
    }

    function actualizarTimer() {
      const m = Math.floor(segsRestantes / 60);
      const s = segsRestantes % 60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
      document.getElementById('barra').style.width =
        Math.min(100, (segsTransc / TOTAL_SEGS) * 100) + '%';
    }

    function mostrarBanner(texto, tipo) {
      const b = document.getElementById('banner-cambio');
      b.textContent = texto;
      b.className   = `visible ${tipo}`;
      setTimeout(() => b.className = tipo, 2200);
    }

    // ================================================================
    //  LÓGICA DEL TIMER
    // ================================================================

    function empezarDescanso() {
      modo          = 'descanso';
      segsRestantes = DESCANSO;
      pintarModo();
      actualizarDescanso();
      sonidoInicioDescanso();
      mostrarBanner('💧 ¡Descansa un momento!', 'descanso');
      // Música: durante descanso suena relax (fade suave si venía de central)
      iniciarMusica('descanso');
    }

    function empezarEjercicio() {
      modo          = 'ejercicio';
      segsRestantes = parseInt(ejercicios[idxActual].segundos) || 60;
      const tipo    = ejercicios[idxActual]._tipo || '';
      pintarModo();
      actualizarEjercicio();
      sonidoInicioEjercicio();
      mostrarBanner(`🌟 Ejercicio ${idxActual + 1}: ${ejercicios[idxActual].nombre}`, 'ejercicio');
      iniciarMusica(tipo);
    }

    function saltarDescanso() {
      if (modo !== 'descanso') return;
      segsTransc   += segsRestantes;
      segsRestantes = 0;
      tick();
    }

    function tick() {
      if (pausado) return;
      if (segsRestantes === 3) sonidoAviso();

      segsRestantes--;
      segsTransc++;
      actualizarTimer();

      // Mostrar el siguiente ejercicio cuando quedan ≤ AVISO_SIGUIENTE segundos
      if (modo === 'ejercicio') {
        const haysiguiente = idxActual + 1 < ejercicios.length;
        if (haysiguiente && segsRestantes <= AVISO_SIGUIENTE && segsRestantes > 0) {
          actualizarSiguienteCard();
          pintarModo(true);   // mostrarSiguiente = true
        }
      }

      if (segsRestantes > 0) return;

      if (modo === 'ejercicio') {
        idxActual++;
        if (idxActual >= ejercicios.length) { finSesion(); return; }
        empezarDescanso();
      } else {
        empezarEjercicio();
      }
    }

    function togglePausa() {
      pausado = !pausado;
      document.getElementById('btn-pausa').textContent = pausado ? '▶' : '⏸';
      if (audioCtx) pausado ? audioCtx.suspend() : audioCtx.resume();
      pausado ? pausarMusica() : reanudarMusica();
    }

    function salir() {
      clearInterval(intervalo);
      detenerMusica();
      window.location.href = 'feedback.html';
    }

    function finSesion() {
      clearInterval(intervalo);
      sonidoFin();
      detenerMusica();
      marcarSesionCompleta();

      document.getElementById('timer').textContent       = '0:00';
      document.getElementById('barra').style.cssText    += '; width:100%; transition:none';
      document.getElementById('media-wrap').textContent  = '🎉';
      document.getElementById('ej-nombre').textContent   = '¡Lo has conseguido!';
      document.getElementById('ej-desc').textContent     = '¡Eres increíble!';
      document.getElementById('music-indicator').textContent = '';
      document.getElementById('siguiente-card').className = '';
      document.getElementById('btn-saltar').className     = 'btn-ctrl';
      document.getElementById('btn-pausa').style.display  = 'none';
      const btnSalir = document.querySelector('.btn-salir');
      btnSalir.textContent = 'Continuar →';
      btnSalir.onclick     = () => window.location.href = 'feedback.html';
      setTimeout(() => window.location.href = 'feedback.html', 3500);
    }

    // ================================================================
    //  ARRANCAR (gesto de usuario → AudioContext + música permitidos)
    // ================================================================

    function arrancar() {
      crearAudioCtx();
      document.getElementById('overlay').style.display = 'none';
      actualizarEjercicio();
      actualizarTimer();
      pintarModo();
      iniciarMusica(ejercicios[0]?._tipo || '');
      intervalo = setInterval(tick, 1000);
    }

    actualizarTimer();
  </script>
</body>
</html>
